services:
  app:
    build: ./app
    container_name: express_opti_app
    ports:
      - "3020:3020"
    environment:
      PORT: 3020
      DB_HOST: db
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: mydb
    networks:
      - monitoring

 
networks:
  monitoring:
    external: true
