syntax = "proto3";

package checkout;

service CheckoutService {

  rpc CreateCheckout (CreateCheckoutRequest)
  returns (CheckoutResponse);

}


message CreateCheckoutRequest {
  string name = 1;
  int32 amount = 2;
  string item = 3;
}


message CheckoutResponse {
  int32 id = 1;
  string name = 2;
  int32 amount = 3;
  string item = 4;
}